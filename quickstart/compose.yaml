services:
  backend:
    image: ghcr.io/yourorg/knowledge-store:latest
    # Run as host-matching UID/GID so internal git works predictably on bind mounts.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${PORT:-8080}:3000"
    volumes:
      - ./wiki-data:/app/data
      - ${IMPORT_CONTENT_FROM:-/dev/null}:/import:ro
    environment:
      SNAPSHOT_ENABLED: ${SNAPSHOT_ENABLED:-false}
      KS_AUTH_MODE: ${KS_AUTH_MODE:-}
      KS_USER_NAME: ${KS_USER_NAME:-}
      KS_USER_EMAIL: ${KS_USER_EMAIL:-}
      KS_USER_ID: ${KS_USER_ID:-}

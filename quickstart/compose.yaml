services:
  backend:
    image: ghcr.io/adamgit/civigent:latest
    ports:
      - "${PORT:-8080}:3000"
    volumes:
      - ./wiki-data:/app/data
      - ${IMPORT_CONTENT_FROM:-/dev/null}:/import:ro
    environment:
      KS_EXTERNAL_PORT: ${PORT:-8080}
      KS_EXTERNAL_HOSTNAME: ${KS_EXTERNAL_HOSTNAME:-localhost}
      KS_SNAPSHOT_ENABLED: ${KS_SNAPSHOT_ENABLED:-false}
      KS_GOVERNANCE_MODE: ${KS_GOVERNANCE_MODE:-}
      KS_INVOLVEMENT_PRESET: ${KS_INVOLVEMENT_PRESET:-}
      KS_AUTH_MODE: ${KS_AUTH_MODE:-}
      KS_AUTH_SECRET: ${KS_AUTH_SECRET:-}
      KS_USER_NAME: ${KS_USER_NAME:-}
      KS_USER_EMAIL: ${KS_USER_EMAIL:-}
      KS_USER_ID: ${KS_USER_ID:-}
      KS_OIDC_PUBLIC_URL: ${KS_OIDC_PUBLIC_URL:-}
      KS_MCP_PUBLIC_URL: ${KS_MCP_PUBLIC_URL:-}
      KS_MCP_PUBLIC_URL_FROM_HEADERS: ${KS_MCP_PUBLIC_URL_FROM_HEADERS:-}
      KS_OIDC_ISSUER: ${KS_OIDC_ISSUER:-}
      KS_OIDC_CLIENT_ID: ${KS_OIDC_CLIENT_ID:-}
      KS_OIDC_CLIENT_SECRET: ${KS_OIDC_CLIENT_SECRET:-}
      KS_OIDC_DISPLAY_NAME: ${KS_OIDC_DISPLAY_NAME:-}
      KS_AGENT_AUTH_POLICY: ${KS_AGENT_AUTH_POLICY:-}
      KS_AGENT_ANON_SALT: ${KS_AGENT_ANON_SALT:-}
